[theme]
primaryColor="#6366F1"  # Modern Indigo (used by top SaaS apps)
backgroundColor="#0B1220"  # Deep navy (professional dark base)
secondaryBackgroundColor="#111827"  # Card/container background
textColor="#E5E7EB"  # Soft white for readability
font="sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
