[theme]
primaryColor="#4F46E5"  # Elegant Indigo (modern & trustworthy)
backgroundColor="#F9FAFB"  # Soft light gray (easy on eyes)
secondaryBackgroundColor="#FFFFFF"  # Clean white cards
textColor="#111827"  # Deep gray (better than pure black)
font="sans serif"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
